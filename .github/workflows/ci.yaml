name: Continuous Integration

permissions:
  contents: read
  packages: write
  actions: write

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/mbc-digital/radyonatin-web:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-arg: |
            # TODO: runtime env
            NEXT_PUBLIC_DOMAIN=https://www.radyonatin.com.ph
            NEXT_PUBLIC_API_BASE_URL=https://www.radyonatin.com.ph/api
            NEXT_PUBLIC_MANAGE_DOMAIN=https://cms.radyonatin.com>ph
            NEXT_PUBLIC_ENV=production

      - name: Dokploy Deployment
        env:
          AUTH_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          APPLICATION_ID: ${{ vars.DOKPLOY_APP_ID }}
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
        run: |
            curl -X 'POST' \
            "$DOKPLOY_URL/api/trpc/application.deploy" \
            -H 'Accept: application/json' \
            -H "X-Api-Key: $AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{\"json\":{\"applicationId\":\"$APPLICATION_ID\"}}"
